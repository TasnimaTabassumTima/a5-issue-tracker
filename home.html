<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker | Home</title>

    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css style -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body>
    <header class="mb-14">
        <div class="navbar bg-base-100 shadow-sm px-20 flex flex-col gap-4 lg:flex-row lg:justify-between">
            <div class="flex gap-1 items-center">
                <img class="max-w-9" src="./assets/github-logo.png" alt="">
                <a class="btn btn-ghost text-2xl">GitHub Issues Tracker</a>
            </div>

            <div class="flex gap-4">
                <div>
                    <label class="input validator join-item">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search issues..." required />
                    </label>
                </div>
                <button class="btn btn-primary join-item">+ New Issue</button>
            </div>

        </div>
    </header>

    <section class="bg-base-200 shadow p-6 gap-2 mb-4 max-w-[1110px] mx-auto rounded-md">
        <button id="btn-all" class="btn px-10 py-3  btn-primary">All</button>
        <button id="btn-open" class="btn px-10 py-3">Open</button>
        <button id="btn-closed" class="btn px-10 py-3">Closed</button>
    </section>

    <section class="bg-base-200 shadow p-6 max-w-[1110px] mx-auto rounded-md flex justify-between">
        <div class="flex gap-2 items-center">
            <img class="bg-[#ECE4FF] rounded-[50%] p-2" src="./assets/Aperture.png" alt="">
            <div>
                <h2 class="font-semibold text-xl"><span id="issue-counter">50</span> Issues</h2>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-4">
            <div class="flex gap-2 items-center">
                <div id="open-dot" class="w-4 h-4 bg-[#00A96E] rounded-full"></div>
                <p class="font-medium text-[#1F2937]">Open</p>
            </div>
            <div class="flex gap-2 items-center">
                <div id="closed-dot" class="w-4 h-4 bg-[#A855F7] rounded-full"></div>
                <p class="font-medium text-[#1F2937]">Closed</p>
            </div>

        </div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="card_details.showModal()">open modal</button> -->
    <dialog id="card_details" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <h2 class="font-semibold text-[14px] text-[#1F2937]">Fix navigation menu on mobile devices</h2>
            <p class="py-4">Press ESC key or click the button below to close</p>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <section id="all" class="bg-base-200 shadow p-6 gap-2 mb-4 max-w-[1110px] mx-auto rounded-md">
        <div id="all-issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">

        </div>
    </section>

    <section id="open" class="bg-base-200 shadow p-6 gap-2 mb-4 max-w-[1110px] mx-auto rounded-md hidden">
        <div id="open-issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">

        </div>
    </section>

    <section id="closed" class="bg-base-200 shadow p-6 gap-2 mb-4 max-w-[1110px] mx-auto rounded-md hidden">
        <div id="closed-issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">

        </div>
    </section>

    <script src="./script/home.js"></script>
</body>

</html>
